{% extends "base.html" %}

{% block title %}Checkout - PrintCraft{% endblock %}

{% block content %}
<div class="container">
    <h2 class="mb-4"><i class="bi bi-credit-card"></i> Checkout</h2>
    
    <div class="row">
        <div class="col-md-8">
            <div class="card mb-4">
                <div class="card-header">
                    <h5 class="mb-0">Shipping Information</h5>
                </div>
                <div class="card-body">
                    <form id="checkout-form">
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">Full Address *</label>
                                <textarea class="form-control" id="shipping_address" rows="3" required></textarea>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" id="contact_phone">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email {{ '*' if not session.get('customer_id') else '' }}</label>
                                <input type="email" class="form-control" id="contact_email" 
                                       {% if session.get('customer_id') %}disabled{% else %}required{% endif %}>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Order Notes (Optional)</label>
                            <textarea class="form-control" id="notes" rows="2" placeholder="Any special instructions..."></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="bi bi-check-circle"></i> Place Order
                        </button>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Order Summary</h5>
                </div>
                <div class="card-body" id="order-summary">
                    <div class="text-center py-3">
                        <div class="loading"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Load cart summary
    fetch('/cart/')
        .then(response => response.json())
        .then(data => {
            const cart = data.cart;
            const container = document.getElementById('order-summary');
            
            if (cart.items.length === 0) {
                window.location.href = '/cart';
                return;
            }
            
            container.innerHTML = `
                ${cart.items.map(item => `
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-truncate">${item.quantity}x ${item.product.product_name}</span>
                        <span>$${item.line_total.toFixed(2)}</span>
                    </div>
                `).join('')}
                <hr>
                <div class="d-flex justify-content-between">
                    <strong>Total:</strong>
                    <strong class="price-tag">$${cart.cart_total.toFixed(2)}</strong>
                </div>
            `;
        });
    
    // Handle checkout form submission
    document.getElementById('checkout-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const formData = {
            shipping_address: document.getElementById('shipping_address').value,
            contact_phone: document.getElementById('contact_phone').value,
            notes: document.getElementById('notes').value
        };
        
        // Add email for guest checkout
        {% if not session.get('customer_id') %}
        formData.contact_email = document.getElementById('contact_email').value;
        {% endif %}
        
        const btn = this.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<span class="loading"></span> Processing...';
        btn.disabled = true;
        
        fetch('/orders/checkout', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(formData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.order) {
                showToast('Order placed successfully!', 'success');
                setTimeout(() => {
                    window.location.href = `/orders/${data.order.order_id}`;
                }, 1000);
            } else {
                throw new Error(data.error || 'Checkout failed');
            }
        })
        .catch(error => {
            showToast(error.message, 'danger');
            btn.innerHTML = originalText;
            btn.disabled = false;
        });
    });
</script>
{% endblock %}
