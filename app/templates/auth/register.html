{% extends "base.html" %}
{% block title %}Register - PrintCraft{% endblock %}

{% block content %}
<main class="auth-container">
  <div class="auth-card">
    <div class="auth-tabs">
      <a href="{{ url_for('auth.login') }}" class="tab">Login</a>
      <a href="{{ url_for('auth.register') }}" class="tab active">Signup</a>
    </div>

    <h2>Create Account</h2>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <input type="text" name="username" placeholder="Username" required>
      <input type="email" name="email" placeholder="Email Address" required>
      <input type="password" name="password" placeholder="Password" required>
      <input type="text" name="first_name" placeholder="First Name" required>
      <input type="text" name="last_name" placeholder="Last Name" required>
      <input type="tel" name="phone_number" placeholder="Phone Number (optional)">
      <button type="submit" class="btn-login">Signup</button>
    </form>

    <p class="switch-text">
      Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
    </p>
  </div>
</main>

 
{% endblock %}
