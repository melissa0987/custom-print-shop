{% extends "base.html" %}

{% block title %}Admin Dashboard - PrintCraft{% endblock %}

{% block content %}
<div class="container-fluid">
    <h2 class="mb-4"><i class="bi bi-speedometer2"></i> Admin Dashboard</h2>
    
    <!-- Statistics Cards -->
    <div class="row mb-4" id="stats-cards">
        <div class="col-12 text-center py-5">
            <div class="loading"></div>
        </div>
    </div>
    
    <!-- Charts Row -->
    <div class="row mb-4">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Recent Orders</h5>
                </div>
                <div class="card-body" id="recent-orders">
                    <div class="text-center py-3">
                        <div class="loading"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Quick Actions</h5>
                </div>
                <div class="card-body">
                    <div class="d-grid gap-2">
                        <a href="/admin/orders" class="btn btn-outline-primary">
                            <i class="bi bi-box-seam"></i> Manage Orders
                        </a>
                        <a href="/admin/products" class="btn btn-outline-primary">
                            <i class="bi bi-grid"></i> Manage Products
                        </a>
                        <a href="/admin/customers" class="btn btn-outline-primary">
                            <i class="bi bi-people"></i> View Customers
                        </a>
                        <a href="/admin/reports" class="btn btn-outline-primary">
                            <i class="bi bi-graph-up"></i> View Reports
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Load dashboard stats
    fetch('/admin/dashboard')
        .then(response => response.json())
        .then(data => {
            const stats = data.dashboard;
            const container = document.getElementById('stats-cards');
            
            container.innerHTML = `
                <div class="col-md-3 mb-3">
                    <div class="card bg-primary text-white">
                        <div class="card-body">
                            <h6 class="card-title">Total Orders</h6>
                            <h2>${stats.orders.total}</h2>
                            <small>
                                <i class="bi bi-hourglass"></i> ${stats.orders.pending} Pending
                            </small>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-3 mb-3">
                    <div class="card bg-success text-white">
                        <div class="card-body">
                            <h6 class="card-title">Total Revenue</h6>
                            <h2>$${stats.revenue.total.toFixed(2)}</h2>
                            <small>
                                <i class="bi bi-calendar-month"></i> $${stats.revenue.month.toFixed(2)} This Month
                            </small>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-3 mb-3">
                    <div class="card bg-info text-white">
                        <div class="card-body">
                            <h6 class="card-title">Customers</h6>
                            <h2>${stats.customers.total}</h2>
                            <small>
                                <i class="bi bi-check-circle"></i> ${stats.customers.active} Active
                            </small>
                        </div>
                    </div>
                </div>
                
                <div class="col-md-3 mb-3">
                    <div class="card bg-warning text-white">
                        <div class="card-body">
                            <h6 class="card-title">Products</h6>
                            <h2>${stats.products.total}</h2>
                            <small>
                                <i class="bi bi-check-circle"></i> ${stats.products.active} Active
                            </small>
                        </div>
                    </div>
                </div>
            `;
        });
    
    // Load recent orders
    fetch('/admin/orders?per_page=5')
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('recent-orders');
            
            if (data.orders && data.orders.length > 0) {
                container.innerHTML = `
                    <div class="table-responsive">
                        <table class="table table-sm">
                            <thead>
                                <tr>
                                    <th>Order #</th>
                                    <th>Customer</th>
                                    <th>Status</th>
                                    <th>Total</th>
                                    <th>Date</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.orders.map(order => {
                                    let badge = 'secondary';
                                    if (order.order_status === 'completed') badge = 'success';
                                    else if (order.order_status === 'processing') badge = 'info';
                                    
                                    const date = new Date(order.created_at);
                                    
                                    return `
                                        <tr>
                                            <td><a href="/admin/orders/${order.order_id}">${order.order_number}</a></td>
                                            <td>${order.customer_name}</td>
                                            <td><span class="badge bg-${badge}">${order.order_status}</span></td>
                                            <td>$${order.total_amount.toFixed(2)}</td>
                                            <td>${date.toLocaleDateString()}</td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                    <a href="/admin/orders" class="btn btn-sm btn-primary w-100">View All Orders</a>
                `;
            } else {
                container.innerHTML = '<p class="text-muted text-center">No recent orders</p>';
            }
        });
</script>
{% endblock %}
