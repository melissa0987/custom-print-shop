{% extends "admin_base.html" %}
{% block title %}Add New Admin - PrintCraft{% endblock %}

{% block content %}
<div class="admin-container">

    <div class="admin-header">
        <h1><i class="bi bi-person-plus"></i> Add New Admin User</h1>
        <a href="{{ url_for('admin.get_admins') }}" class="btn-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>

    <div class="admin-form-card">
        <h2>Create Admin Account</h2>

        <form method="POST" action="{{ url_for('admin.add_admin_from_form') }}">
            
            <!-- Username -->
            <div class="form-group">
                <label>Username:</label>
                <input type="text" 
                    name="username" 
                    placeholder="username" 
                    class="form-control" 
                    required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="email" 
                    class="form-control" 
                    placeholder="sample@gmail.com" 
                    required>
            </div>

            <!-- Password -->
            <div class="form-group">
                    <label for="password">Password:</label>
                    <div class="password-wrapper">
                        <input type="password" 
                                name="password" 
                                id="password"
                               class="form-control"
                               placeholder="password">
                        <button type="button" 
                            class="toggle-password" 
                            data-target="password">
                            👁️
                        </button>
                    </div>
                </div>

            <!-- First name -->
            <div class="form-group">
                <label>First Name:</label>
                <input type="text" 
                    name="first_name" 
                    placeholder="First Name" 
                    class="form-control" 
                    required>
            </div>

            <!-- Last name -->
            <div class="form-group">
                <label>Last Name:</label>
                <input type="text" 
                    name="last_name" 
                    placeholder="Last Name" 
                    class="form-control" 
                    required>
            </div>

            <!-- Role -->
            <div class="form-group">
                <label>Role:</label>
                <select name="role" class="form-control" required>
                    <option value="super_admin">Staff</option>
                    <option value="admin">Admin</option>
                    <option value="super_admin">Super Admin</option>
                </select>
            </div>

            <!-- Status -->
            <div class="form-group active-row">
                <label for="is_active">Active:</label>
                <input type="checkbox" name="is_active" id="is_active" checked>
            </div>

            <div class="form-group">
                <button type="submit" class="btn-primary">Create Admin</button>
                <a href="{{ url_for('admin.get_admins') }}" class="btn-secondary">Cancel</a>
            </div>

        </form>

    </div>
</div>
{% endblock %}
{% block script %}
<script src="{{ url_for('static', filename='js/password.js') }}"></script>

 
{% endblock %}
