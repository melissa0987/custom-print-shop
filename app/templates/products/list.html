{% extends "base.html" %}

{% block title %}Products - PrintCraft{% endblock %}

{% block content %}
<div class="container">
    <div class="row">
        <!-- Sidebar Filters -->
        <div class="col-md-3 mb-4">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-funnel"></i> Filters</h5>
                </div>
                <div class="card-body">
                    <!-- Search -->
                    <div class="mb-3">
                        <label class="form-label">Search</label>
                        <input type="text" class="form-control" id="search" placeholder="Search products...">
                    </div>
                    
                    <!-- Category Filter -->
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="category-filter">
                            <option value="">All Categories</option>
                        </select>
                    </div>
                    
                    <!-- Price Range -->
                    <div class="mb-3">
                        <label class="form-label">Price Range</label>
                        <div class="row g-2">
                            <div class="col-6">
                                <input type="number" class="form-control" id="min-price" placeholder="Min" step="0.01">
                            </div>
                            <div class="col-6">
                                <input type="number" class="form-control" id="max-price" placeholder="Max" step="0.01">
                            </div>
                        </div>
                        <small class="text-muted" id="price-range-text"></small>
                    </div>
                    
                    <!-- Sort By -->
                    <div class="mb-3">
                        <label class="form-label">Sort By</label>
                        <select class="form-select" id="sort-by">
                            <option value="name">Name (A-Z)</option>
                            <option value="price-asc">Price (Low to High)</option>
                            <option value="price-desc">Price (High to Low)</option>
                            <option value="newest">Newest First</option>
                        </select>
                    </div>
                    
                    <button class="btn btn-primary w-100" onclick="applyFilters()">
                        <i class="bi bi-search"></i> Apply Filters
                    </button>
                    <button class="btn btn-outline-secondary w-100 mt-2" onclick="clearFilters()">
                        <i class="bi bi-x-circle"></i> Clear
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Products Grid -->
        <div class="col-md-9">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-grid"></i> Products</h2>
                <div id="products-count" class="text-muted"></div>
            </div>
            
            <!-- Products Container -->
            <div class="row" id="products-container">
                <div class="col-12 text-center py-5">
                    <div class="loading"></div>
                    <p class="text-muted mt-2">Loading products...</p>
                </div>
            </div>
            
            <!-- Pagination -->
            <nav id="pagination-container" class="mt-4"></nav>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentPage = 1;
    let currentFilters = {};
    
    // Load categories for filter
    fetch('/products/categories')
        .then(response => response.json())
        .then(data => {
            const select = document.getElementById('category-filter');
            if (data.categories) {
                data.categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.category_id;
                    option.textContent = cat.category_name;
                    select.appendChild(option);
                });
            }
        });
    
    // Load price range
    fetch('/products/price-range')
        .then(response => response.json())
        .then(data => {
            const text = `Range: $${data.min_price.toFixed(2)} - $${data.max_price.toFixed(2)}`;
            document.getElementById('price-range-text').textContent = text;
        });
    
    // Load products
    function loadProducts(page = 1) {
        currentPage = page;
        
        // Build query string
        const params = new URLSearchParams({
            page: page,
            per_page: 12
        });
        
        if (currentFilters.category_id) params.append('category_id', currentFilters.category_id);
        if (currentFilters.search) params.append('search', currentFilters.search);
        if (currentFilters.min_price) params.append('min_price', currentFilters.min_price);
        if (currentFilters.max_price) params.append('max_price', currentFilters.max_price);
        
        let sort_by = 'name';
        let sort_order = 'asc';
        if (currentFilters.sort_by === 'price-asc') {
            sort_by = 'price';
            sort_order = 'asc';
        } else if (currentFilters.sort_by === 'price-desc') {
            sort_by = 'price';
            sort_order = 'desc';
        } else if (currentFilters.sort_by === 'newest') {
            sort_by = 'newest';
            sort_order = 'desc';
        }
        params.append('sort_by', sort_by);
        params.append('sort_order', sort_order);
        
        const container = document.getElementById('products-container');
        container.innerHTML = '<div class="col-12 text-center py-5"><div class="loading"></div><p class="text-muted mt-2">Loading...</p></div>';
        
        fetch(`/products/?${params}`)
            .then(response => response.json())
            .then(data => {
                // Update count
                document.getElementById('products-count').textContent = 
                    `Showing ${data.products.length} of ${data.pagination.total_products} products`;
                
                // Display products
                if (data.products.length > 0) {
                    container.innerHTML = data.products.map(product => `
                        <div class="col-md-4 mb-4">
                            <div class="card h-100">
                                <div class="card-body">
                                    <div class="text-center mb-3">
                                        <i class="bi bi-image display-3 text-muted"></i>
                                    </div>
                                    <h5 class="card-title">${product.product_name}</h5>
                                    <p class="text-muted small mb-2">
                                        <i class="bi bi-tag"></i> ${product.category.category_name}
                                    </p>
                                    <p class="card-text text-muted small">${product.description || ''}</p>
                                    <div class="d-flex justify-content-between align-items-center mt-3">
                                        <span class="price-tag">$${product.base_price.toFixed(2)}</span>
                                        <div class="btn-group">
                                            <a href="/products/${product.product_id}" class="btn btn-outline-primary btn-sm">
                                                <i class="bi bi-eye"></i>
                                            </a>
                                            <button class="btn btn-primary btn-sm" onclick="quickAddToCart(${product.product_id})">
                                                <i class="bi bi-cart-plus"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <i class="bi bi-inbox display-1 text-muted"></i>
                            <p class="text-muted mt-3">No products found</p>
                        </div>
                    `;
                }
                
                // Update pagination
                updatePagination(data.pagination);
            })
            .catch(error => {
                console.error('Error loading products:', error);
                container.innerHTML = '<div class="col-12"><p class="text-center text-danger">Failed to load products</p></div>';
            });
    }
    
    function updatePagination(pagination) {
        const container = document.getElementById('pagination-container');
        
        if (pagination.total_pages <= 1) {
            container.innerHTML = '';
            return;
        }
        
        let html = '<ul class="pagination justify-content-center">';
        
        // Previous button
        html += `<li class="page-item ${!pagination.has_prev ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="loadProducts(${pagination.page - 1}); return false;">Previous</a>
        </li>`;
        
        // Page numbers
        for (let i = 1; i <= pagination.total_pages; i++) {
            if (i === 1 || i === pagination.total_pages || (i >= pagination.page - 2 && i <= pagination.page + 2)) {
                html += `<li class="page-item ${i === pagination.page ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="loadProducts(${i}); return false;">${i}</a>
                </li>`;
            } else if (i === pagination.page - 3 || i === pagination.page + 3) {
                html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
            }
        }
        
        // Next button
        html += `<li class="page-item ${!pagination.has_next ? 'disabled' : ''}">
            <a class="page-link" href="#" onclick="loadProducts(${pagination.page + 1}); return false;">Next</a>
        </li>`;
        
        html += '</ul>';
        container.innerHTML = html;
    }
    
    function applyFilters() {
        currentFilters = {
            category_id: document.getElementById('category-filter').value,
            search: document.getElementById('search').value,
            min_price: document.getElementById('min-price').value,
            max_price: document.getElementById('max-price').value,
            sort_by: document.getElementById('sort-by').value
        };
        loadProducts(1);
    }
    
    function clearFilters() {
        document.getElementById('category-filter').value = '';
        document.getElementById('search').value = '';
        document.getElementById('min-price').value = '';
        document.getElementById('max-price').value = '';
        document.getElementById('sort-by').value = 'name';
        currentFilters = {};
        loadProducts(1);
    }
    
    function quickAddToCart(productId) {
        addToCart(productId, 1)
            .then(data => {
                showToast('Product added to cart!', 'success');
            })
            .catch(error => {
                showToast(error.message, 'danger');
            });
    }
    
    // Check URL parameters on load
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('category_id')) {
        document.getElementById('category-filter').value = urlParams.get('category_id');
        currentFilters.category_id = urlParams.get('category_id');
    }
    
    // Load initial products
    loadProducts(1);
</script>
{% endblock %}
